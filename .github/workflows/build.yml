name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # 태그 푸시 시 Release 생성용

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 태그(v1.2.3)면 태그에서 버전을 뽑고, 일반 푸시/PR 이면 개발 버전을 붙인다
      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.ref }}'.StartsWith('refs/tags/v')) {
            $v = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $v = "1.0.0-dev.${{ github.run_number }}"
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      - name: Test
        run: dotnet test tests/UartTerminal.Tests/UartTerminal.Tests.csproj -c Release

      # ── 프레임워크 의존(작음, 실행 PC 에 .NET 10 Desktop Runtime 필요) ──
      - name: Publish app (framework-dependent)
        run: >
          dotnet publish src/UartTerminal/UartTerminal.csproj -c Release -r win-x64
          --self-contained false -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o fdd/app
      - name: Publish relay (framework-dependent)
        run: >
          dotnet publish src/UartTerminal.McpRelay/UartTerminal.McpRelay.csproj -c Release -r win-x64
          --self-contained false -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o fdd/relay

      # ── self-contained(큼, .NET 런타임 포함 — 런타임 없이 실행) ──
      - name: Publish app (self-contained)
        run: >
          dotnet publish src/UartTerminal/UartTerminal.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o sc/app
      - name: Publish relay (self-contained)
        run: >
          dotnet publish src/UartTerminal.McpRelay/UartTerminal.McpRelay.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o sc/relay

      # 앱 + MCP 릴레이 exe 를 한 zip 으로 묶는다(MCP 사용 시 릴레이가 앱 옆에 있어야 함)
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory dist | Out-Null
          Compress-Archive -Path fdd/app/UartTerminal.exe, fdd/relay/UartTerminal.McpRelay.exe `
            -DestinationPath dist/UartTerminal-win-x64.zip
          Compress-Archive -Path sc/app/UartTerminal.exe, sc/relay/UartTerminal.McpRelay.exe `
            -DestinationPath dist/UartTerminal-win-x64-standalone.zip
          Get-ChildItem dist | Format-Table Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UartTerminal-win-x64
          path: dist/*

      - name: Create Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create '${{ github.ref_name }}'
          'dist/UartTerminal-win-x64.zip#UartTerminal (win-x64, .NET 10 Desktop Runtime 필요)'
          'dist/UartTerminal-win-x64-standalone.zip#UartTerminal standalone (런타임 포함)'
          --title 'UartTerminal ${{ github.ref_name }}'
          --generate-notes
